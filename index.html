<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eurovision Sky AR (Android)</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#000; }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: grid;
      align-content: end;
      justify-items: center;
      padding: 18px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.65);
    }
    #banner {
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px) scale(0.98);
      transition: opacity 700ms ease, transform 700ms ease;
      font-weight: 800;
      font-size: clamp(20px, 4vw, 44px);
      letter-spacing: 0.02em;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      margin-bottom: 10px;
    }
    #banner.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    #note {
      opacity: 0.9;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="banner">Welcome to Eurovision ✨</div>
    <div id="note">Tip: move your phone slowly for best tracking.</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "../phoenix/vendor/three/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const cacheVersion = params.get("v") || String(Date.now());
    const mainUrl = new URL("./main-android.js", import.meta.url);
    mainUrl.searchParams.set("v", cacheVersion);
    import(mainUrl.toString()).catch((err) => {
      console.error("Failed to load Android AR script:", err);
      const note = document.getElementById("note");
      if (note) note.textContent = "Failed to load AR module. Check console.";
    });
  </script>
</body>
</html>
