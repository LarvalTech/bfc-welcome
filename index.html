<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bohemian FC — Welcome AR</title>
  <meta name="description" content="Bohemian FC AR welcome experience. Created by Tiny Wilderness." />
  <meta name="author" content="Tiny Wilderness" />
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#000; }

    /* ─── Splash screen ─────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      text-align: center;
      padding: 32px 24px;
      transition: opacity 600ms ease;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .splash-badge {
      display: inline-block;
      background: #cc0000;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 4px;
      margin-bottom: 22px;
    }
    .splash-competition {
      color: #aaa;
      font-size: clamp(11px, 2.8vw, 14px);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .splash-teams {
      color: #fff;
      font-size: clamp(26px, 7vw, 52px);
      font-weight: 900;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .splash-teams span { color: #cc0000; }
    .splash-vs {
      color: #555;
      font-size: clamp(13px, 3vw, 18px);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 4px 0;
    }
    .splash-divider {
      width: 48px;
      height: 2px;
      background: #cc0000;
      border-radius: 2px;
      margin: 20px auto;
    }
    .splash-details {
      color: #ccc;
      font-size: clamp(13px, 3.2vw, 16px);
      font-weight: 400;
      line-height: 1.8;
      letter-spacing: 0.01em;
    }
    .splash-details strong { color: #fff; font-weight: 600; }
    .splash-instruction {
      color: #777;
      font-size: clamp(11px, 2.6vw, 13px);
      margin-top: 14px;
      margin-bottom: 0;
      letter-spacing: 0.02em;
    }
    .splash-cta {
      margin-top: 20px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 15px 44px;
      font-size: clamp(15px, 3.5vw, 18px);
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(200,0,0,0.45);
      transition: opacity 150ms ease, transform 150ms ease;
    }
    .splash-cta:active { opacity: 0.8; transform: scale(0.97); }
    .splash-credit {
      margin-top: 28px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.04em;
    }

    /* ─── Hide the native ARButton — splash button drives the session ── */
    #ARButton { display: none !important; }

    /* ─── Android HUD (shown only during AR session) ────────────── */
    #hud {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 18px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.65);
    }
    #hud.active { display: flex; }
    #stop-ar-btn {
      pointer-events: all;
      align-self: flex-end;
      background: rgba(0,0,0,0.45);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 9px 22px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #stop-ar-btn:active { opacity: 0.7; }
    #banner {
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px) scale(0.98);
      transition: opacity 700ms ease, transform 700ms ease;
      font-weight: 800;
      font-size: clamp(20px, 4vw, 44px);
      letter-spacing: 0.02em;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(180,0,0,0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      margin-bottom: 10px;
    }
    #banner.show { opacity: 1; transform: translateY(0) scale(1); }

    /* ─── iOS camera feed ───────────────────────────────────────── */
    #cameraFeed {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* ─── iOS welcome banner ────────────────────────────────────── */
    #welcomeBanner {
      display: none;
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      transition: opacity 700ms ease, transform 700ms ease;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 5vw, 40px);
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.65);
      background: rgba(180,0,0,0.75);
      padding: 10px 20px;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
      z-index: 10;
    }
    #welcomeBanner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- ── Splash screen — single tap launches AR on both platforms ── -->
  <div id="splash">
    <div class="splash-badge">AR Experience</div>
    <div class="splash-competition">SSE Airtricity Senior Women's Football</div>
    <div class="splash-teams"><span>Bohemian FC</span></div>
    <div class="splash-vs">vs</div>
    <div class="splash-teams">Cork City</div>
    <div class="splash-divider"></div>
    <div class="splash-details">
      <strong>March 21st</strong> &nbsp;|&nbsp; <strong>3:00pm</strong><br>
      Dalymount Park
    </div>
    <p class="splash-instruction">Point your camera at the sky and tap to begin</p>
    <button class="splash-cta" id="splashBtn">C'Mon Bohs! ⚽</button>
    <p class="splash-credit">Created by Tiny Wilderness</p>
  </div>

  <!-- Android WebXR HUD (hidden until session starts) -->
  <div id="hud">
    <button id="stop-ar-btn">&#x2715; End AR</button>
    <div id="banner">C'Mon Bohs! 🔴⚫</div>
  </div>

  <!-- iOS camera feed -->
  <video id="cameraFeed" autoplay playsinline muted></video>

  <!-- iOS welcome banner -->
  <div id="welcomeBanner">C'Mon Bohs! 🔴⚫</div>

  <!-- Hidden iOS start trigger (used by main-ios.js internally) -->
  <button id="startBtn" style="display:none">start</button>

  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    const params = new URLSearchParams(window.location.search);
    const cacheVersion = params.get("v") || String(Date.now());

    function dismissSplash() {
      const splash = document.getElementById("splash");
      splash.classList.add("fade-out");
      setTimeout(() => { splash.style.display = "none"; }, 650);
    }

    if (isIOS) {
      // iOS: load script first, then splash button triggers startExperience directly
      document.getElementById("cameraFeed").style.display = "block";
      document.getElementById("welcomeBanner").style.display = "block";

      const mainUrl = new URL("./main-ios.js", import.meta.url);
      mainUrl.searchParams.set("v", cacheVersion);
      import(mainUrl.toString()).then(() => {
        // Wire splash button to the hidden startBtn (which main-ios.js listens to)
        document.getElementById("splashBtn").addEventListener("click", () => {
          dismissSplash();
          document.getElementById("startBtn").click();
        });
      }).catch((err) => {
        console.error("Failed to load iOS AR script:", err);
        document.getElementById("splashBtn").textContent = "Failed to load — please refresh";
      });

    } else {
      // Android: load script, then splash button clicks the ARButton
      const mainUrl = new URL("./main-android.js", import.meta.url);
      mainUrl.searchParams.set("v", cacheVersion);
      import(mainUrl.toString()).then(() => {
        document.getElementById("splashBtn").addEventListener("click", () => {
          dismissSplash();
          // Show HUD and click the ARButton to start the WebXR session
          document.getElementById("hud").classList.add("active");
          const arBtn = document.getElementById("ARButton");
          if (arBtn) arBtn.click();

          // Wire stop button to end the session
          document.getElementById("stop-ar-btn").addEventListener("click", () => {
            const arBtn = document.getElementById("ARButton");
            if (arBtn) arBtn.click(); // ARButton toggles: click again to STOP AR
            document.getElementById("hud").classList.remove("active");
            // Show splash again so user can restart
            const splash = document.getElementById("splash");
            splash.style.display = "flex";
            splash.style.opacity = "1";
            splash.classList.remove("fade-out");
          });
        });
      }).catch((err) => {
        console.error("Failed to load Android AR script:", err);
        document.getElementById("splashBtn").textContent = "Failed to load — please refresh";
      });
    }
  </script>
</body>
</html>
