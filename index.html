<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bohemian FC — Welcome AR</title>
  <meta name="description" content="Bohemian FC AR welcome experience. Created by Tiny Wilderness." />
  <meta name="author" content="Tiny Wilderness" />
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#000; }

    /* ─── Splash screen ─────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      text-align: center;
      padding: 32px 24px;
      transition: opacity 600ms ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    .splash-badge {
      display: inline-block;
      background: #cc0000;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 4px;
      margin-bottom: 22px;
    }
    .splash-competition {
      color: #aaa;
      font-size: clamp(11px, 2.8vw, 14px);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .splash-teams {
      color: #fff;
      font-size: clamp(26px, 7vw, 52px);
      font-weight: 900;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .splash-teams span { color: #cc0000; }
    .splash-vs {
      color: #555;
      font-size: clamp(13px, 3vw, 18px);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 4px 0;
    }
    .splash-divider {
      width: 48px;
      height: 2px;
      background: #cc0000;
      border-radius: 2px;
      margin: 20px auto;
    }
    .splash-details {
      color: #ccc;
      font-size: clamp(13px, 3.2vw, 16px);
      font-weight: 400;
      line-height: 1.8;
      letter-spacing: 0.01em;
    }
    .splash-details strong { color: #fff; font-weight: 600; }
    .splash-instruction {
      color: #777;
      font-size: clamp(11px, 2.6vw, 13px);
      margin-top: 14px;
      margin-bottom: 0;
      letter-spacing: 0.02em;
    }
    .splash-cta {
      margin-top: 20px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 15px 44px;
      font-size: clamp(15px, 3.5vw, 18px);
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(200,0,0,0.45);
      transition: opacity 150ms ease, transform 150ms ease;
    }
    .splash-cta:active { opacity: 0.8; transform: scale(0.97); }
    .splash-credit {
      margin-top: 28px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.04em;
    }

    /* ─── Hide the native ARButton — splash button drives the session ── */
    #ARButton { display: none !important; }

    /* ─── Android HUD ───────────────────────────────────────────── */
    #hud {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 18px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.65);
      z-index: 10;
    }
    #hud.active { display: flex; }

    /* Top row: stop button left, selfie toggle right (iOS only) */
    .hud-top {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: all;
    }
    #stop-ar-btn, #selfie-toggle-btn {
      background: rgba(0,0,0,0.45);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #stop-ar-btn:active, #selfie-toggle-btn:active { opacity: 0.7; }
    #selfie-toggle-btn { display: none; } /* shown only on iOS */

    /* Bottom row: banner + screenshot button */
    .hud-bottom {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #banner {
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px) scale(0.98);
      transition: opacity 700ms ease, transform 700ms ease;
      font-weight: 800;
      font-size: clamp(20px, 4vw, 44px);
      letter-spacing: 0.02em;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(180,0,0,0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #banner.show { opacity: 1; transform: translateY(0) scale(1); }

    /* Screenshot button */
    #screenshot-btn {
      pointer-events: all;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 3px solid rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 120ms ease, opacity 120ms ease;
    }
    #screenshot-btn:active { transform: scale(0.88); opacity: 0.7; }
    #screenshot-btn svg { width: 28px; height: 28px; fill: #fff; }

    /* Shutter flash overlay */
    #shutter-flash {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 500;
      transition: opacity 80ms ease;
    }
    #shutter-flash.flash {
      display: block;
      opacity: 0.85;
    }

    /* ─── iOS camera feed ───────────────────────────────────────── */
    #cameraFeed {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* ─── iOS welcome banner ────────────────────────────────────── */
    #welcomeBanner {
      display: none;
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      transition: opacity 700ms ease, transform 700ms ease;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 5vw, 40px);
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.65);
      background: rgba(180,0,0,0.75);
      padding: 10px 20px;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
      z-index: 10;
    }
    #welcomeBanner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- ── Splash screen ── -->
  <div id="splash">
    <div class="splash-badge">AR Experience</div>
    <div class="splash-competition">SSE Airtricity Senior Women's Football</div>
    <div class="splash-teams"><span>Bohemian FC</span></div>
    <div class="splash-vs">vs</div>
    <div class="splash-teams">Cork City</div>
    <div class="splash-divider"></div>
    <div class="splash-details">
      <strong>March 21st</strong> &nbsp;|&nbsp; <strong>3:00pm</strong><br>
      Dalymount Park
    </div>
    <p class="splash-instruction">Point your camera at the sky and tap to begin</p>
    <button class="splash-cta" id="splashBtn">C'Mon Bohs! ⚽</button>
    <p class="splash-credit">Created by Tiny Wilderness</p>
  </div>

  <!-- Shutter flash overlay -->
  <div id="shutter-flash"></div>

  <!-- HUD — used by both Android (WebXR) and iOS -->
  <div id="hud">
    <div class="hud-top">
      <button id="stop-ar-btn">&#x2715; End AR</button>
      <button id="selfie-toggle-btn">🤳 Selfie</button>
    </div>
    <div class="hud-bottom">
      <div id="banner">C'Mon Bohs! 🔴⚫</div>
      <!-- Screenshot / share button -->
      <button id="screenshot-btn" title="Take a photo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 3L7.17 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0
            2-2V7a2 2 0 0 0-2-2h-3.17L15 3H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0
            10zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- iOS camera feed -->
  <video id="cameraFeed" autoplay playsinline muted></video>

  <!-- iOS welcome banner -->
  <div id="welcomeBanner">C'Mon Bohs! 🔴⚫</div>

  <!-- Hidden iOS start trigger -->
  <button id="startBtn" style="display:none">start</button>

  <script type="importmap">
    { "imports": { "three": "./vendor/three/build/three.module.js" } }
  </script>

  <script type="module">
    // ── Platform detection ──────────────────────────────────────────
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    const params = new URLSearchParams(window.location.search);
    const cacheVersion = params.get("v") || String(Date.now());

    // ── Analytics ───────────────────────────────────────────────────
    // Lightweight event logger — replace body with GA4 / Plausible when ready
    function logEvent(name, data = {}) {
      const payload = { event: name, platform: isIOS ? "ios" : "android",
                        ts: new Date().toISOString(), ...data };
      console.info("[TW Analytics]", payload);
      // GA4 hook (no-op until gtag is loaded):
      if (typeof gtag === "function") {
        gtag("event", name, { ...data, platform: payload.platform });
      }
    }

    // ── Return visit detection ──────────────────────────────────────
    const MATCH_KEY = "tw_bfc_march21";
    const isReturn = !!localStorage.getItem(MATCH_KEY);
    if (isReturn) logEvent("return_visit");
    localStorage.setItem(MATCH_KEY, "1");

    // ── Shutter flash ───────────────────────────────────────────────
    function triggerShutterFlash() {
      const flash = document.getElementById("shutter-flash");
      flash.classList.add("flash");
      setTimeout(() => {
        flash.style.transition = "opacity 300ms ease";
        flash.style.opacity = "0";
        setTimeout(() => {
          flash.classList.remove("flash");
          flash.style.transition = "";
          flash.style.opacity = "";
        }, 320);
      }, 80);
    }

    // ── Screenshot capture & share ──────────────────────────────────
    async function takeScreenshot() {
      triggerShutterFlash();
      logEvent("screenshot_taken");

      // Small delay to let the current frame settle
      await new Promise(r => setTimeout(r, 60));

      try {
        // Find the WebGL canvas (Three.js renderer)
        const canvas = document.querySelector("canvas");
        if (!canvas) throw new Error("No canvas found");

        if (isIOS) {
          // iOS: composite camera feed + Three.js canvas into an offscreen canvas
          const offscreen = document.createElement("canvas");
          offscreen.width = canvas.width;
          offscreen.height = canvas.height;
          const ctx = offscreen.getContext("2d");

          const video = document.getElementById("cameraFeed");
          if (video && video.readyState >= 2) {
            ctx.drawImage(video, 0, 0, offscreen.width, offscreen.height);
          }
          ctx.drawImage(canvas, 0, 0);

          const blob = await new Promise(res => offscreen.toBlob(res, "image/png"));
          await shareOrDownload(blob);
        } else {
          // Android WebXR: canvas already has the composited frame
          const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
          await shareOrDownload(blob);
        }
      } catch (err) {
        console.warn("Screenshot failed:", err);
      }
    }

    async function shareOrDownload(blob) {
      const file = new File([blob], "cmon-bohs.png", { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: "C'Mon Bohs! ⚽",
          text: "Bohemian FC AR experience — Dalymount Park, March 21st"
        });
      } else {
        // Fallback: trigger download
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "cmon-bohs.png";
        a.click();
        URL.revokeObjectURL(url);
      }
    }

    document.getElementById("screenshot-btn").addEventListener("click", takeScreenshot);

    // ── Selfie toggle (iOS only) ────────────────────────────────────
    let selfieModeActive = false;
    const selfieBtn = document.getElementById("selfie-toggle-btn");

    async function toggleSelfieMode() {
      selfieModeActive = !selfieModeActive;
      selfieBtn.textContent = selfieModeActive ? "🌍 Back" : "🤳 Selfie";
      logEvent("selfie_mode_entered", { active: selfieModeActive });

      // Tell main-ios.js to switch camera
      if (typeof window._switchCamera === "function") {
        await window._switchCamera(selfieModeActive ? "user" : "environment");
      }
    }
    selfieBtn.addEventListener("click", toggleSelfieMode);

    // ── Splash dismiss ──────────────────────────────────────────────
    function dismissSplash() {
      const splash = document.getElementById("splash");
      splash.classList.add("fade-out");
      setTimeout(() => { splash.style.display = "none"; }, 650);
    }

    // ── Session end handler ─────────────────────────────────────────
    function onSessionEnd() {
      logEvent("ar_session_end");
      document.getElementById("hud").classList.remove("active");
      const splash = document.getElementById("splash");
      splash.style.display = "flex";
      splash.style.opacity = "1";
      splash.classList.remove("fade-out");
    }

    // ── Platform routing ────────────────────────────────────────────
    if (isIOS) {
      document.getElementById("cameraFeed").style.display = "block";
      document.getElementById("welcomeBanner").style.display = "block";
      selfieBtn.style.display = "block"; // show selfie toggle on iOS

      const mainUrl = new URL("./main-ios.js", import.meta.url);
      mainUrl.searchParams.set("v", cacheVersion);
      import(mainUrl.toString()).then(() => {
        document.getElementById("splashBtn").addEventListener("click", () => {
          dismissSplash();
          document.getElementById("hud").classList.add("active");
          document.getElementById("startBtn").click();
          logEvent("ar_session_start");
        });
      }).catch((err) => {
        console.error("Failed to load iOS AR script:", err);
        document.getElementById("splashBtn").textContent = "Failed to load — please refresh";
      });

    } else {
      const mainUrl = new URL("./main-android.js", import.meta.url);
      mainUrl.searchParams.set("v", cacheVersion);
      import(mainUrl.toString()).then(() => {
        document.getElementById("splashBtn").addEventListener("click", () => {
          dismissSplash();
          document.getElementById("hud").classList.add("active");
          const arBtn = document.getElementById("ARButton");
          if (arBtn) arBtn.click();
          logEvent("ar_session_start");

          // Listen for session end via ARButton text change
          const observer = new MutationObserver(() => {
            if (arBtn && arBtn.textContent.trim() === "START AR") {
              onSessionEnd();
            }
          });
          if (arBtn) observer.observe(arBtn, { childList: true, characterData: true, subtree: true });

          // Stop button
          document.getElementById("stop-ar-btn").addEventListener("click", () => {
            const arBtn = document.getElementById("ARButton");
            if (arBtn) arBtn.click();
            onSessionEnd();
          });
        });
      }).catch((err) => {
        console.error("Failed to load Android AR script:", err);
        document.getElementById("splashBtn").textContent = "Failed to load — please refresh";
      });
    }

    // ── Visibility change → session end ────────────────────────────
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) logEvent("ar_session_end", { reason: "visibility_hidden" });
    });
  </script>
</body>
</html>
